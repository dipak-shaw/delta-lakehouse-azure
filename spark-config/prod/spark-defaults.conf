# Spark Configuration for Production Environment
# These settings are optimized for Delta Lake on Azure Databricks

# Core Configurations
spark.sql.adaptive.enabled                                  true
spark.sql.adaptive.coalescePartitions.enabled               true
spark.sql.adaptive.skewJoin.enabled                         true
spark.sql.adaptive.localShuffleReader.enabled               true
spark.sql.adaptive.nonEmptyPartitionRatioForBroadcastJoin   0.2
spark.sql.adaptive.advisoryPartitionSizeInBytes             64m

# Memory Configurations
spark.memory.fraction                                       0.8
spark.memory.storageFraction                                0.3
spark.memory.offHeap.enabled                                true
spark.memory.offHeap.size                                   16g

# Shuffle Configurations
spark.sql.shuffle.partitions                                200
spark.shuffle.service.enabled                               true
spark.shuffle.io.maxRetries                                 10
spark.shuffle.io.retryWait                                  30s

# Delta Lake Optimizations
spark.databricks.delta.optimizeWrite.enabled                true
spark.databricks.delta.autoCompact.enabled                  true
spark.sql.parquet.columnarReaderBatchSize                   4096
spark.sql.parquet.compression.codec                         snappy
spark.databricks.delta.properties.defaults.enableChangeDataFeed true
spark.databricks.delta.schema.autoMerge.enabled             true

# Query Optimization
spark.sql.autoBroadcastJoinThreshold                        100MB
spark.sql.broadcastTimeout                                  600s
spark.sql.files.maxPartitionBytes                           128MB
spark.sql.files.openCostInBytes                             16MB
spark.sql.optimizer.dynamicPartitionPruning.enabled         true
spark.sql.optimizer.excludedRules                           org.apache.spark.sql.catalyst.optimizer.ConvertToLocalRelation
spark.sql.optimizer.inSetConversionThreshold                50

# Execution Parameters
spark.sql.execution.arrow.enabled                           true
spark.sql.execution.arrow.pyspark.enabled                   true
spark.databricks.delta.preview.enhancedTimeTravelStats      true

# Caching
spark.databricks.io.cache.enabled                           true
spark.databricks.io.cache.maxDiskUsage                      50g
spark.databricks.io.cache.maxMetaDataCache                  1g

# Driver and Executor Settings
spark.driver.maxResultSize                                  8g
spark.driver.memory                                         16g
spark.executor.memory                                       32g
spark.executor.cores                                        8
spark.executor.instances                                    8
spark.driver.cores                                          8

# Network Timeouts
spark.network.timeout                                       800s
spark.rpc.askTimeout                                        600s
spark.storage.blockManagerSlaveTimeoutMs                    600s

# Checkpointing
spark.sql.streaming.checkpointLocation                      /mnt/delta/checkpoints/prod/

# Custom Logging
spark.databricks.service.dbfs.enabled                       true
spark.databricks.repl.allowedLanguages                      python,sql,r,scala
